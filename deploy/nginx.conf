# Next.js, NestJS REST, local uploads, and Socket.IO reverse proxy.
upstream web_upstream {
  server web:3000;
}

upstream api_upstream {
  server api:4000;
}

map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

map $http_x_forwarded_proto $forwarded_proto {
  default $http_x_forwarded_proto;
  '' $scheme;
}

limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=login:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=upload:10m rate=30r/m;
limit_req_status 429;

server {
  listen 80;
  server_name _;

  server_tokens off;
  client_max_body_size 15m;

  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  location = /nginx-health {
    access_log off;
    add_header Content-Type text/plain;
    return 200 'ok';
  }

  location = /api/auth/login {
    limit_req zone=login burst=5 nodelay;
    proxy_pass http://api_upstream/auth/login;
    include /etc/nginx/proxy-headers.conf;
    proxy_set_header X-Forwarded-Proto $forwarded_proto;
  }

  location ^~ /api/upload/ {
    limit_req zone=upload burst=10 nodelay;
    proxy_pass http://api_upstream/upload/;
    include /etc/nginx/proxy-headers.conf;
    proxy_set_header X-Forwarded-Proto $forwarded_proto;
    proxy_request_buffering off;
  }

  # The API serves local fallback files at /uploads; keep the public API prefix.
  location ^~ /api/uploads/ {
    limit_req zone=api burst=40 nodelay;
    proxy_pass http://api_upstream/uploads/;
    include /etc/nginx/proxy-headers.conf;
    proxy_set_header X-Forwarded-Proto $forwarded_proto;
    expires 7d;
    add_header Cache-Control "public, max-age=604800, immutable";
  }

  # The trailing slash strips /api/ before forwarding to Nest routes.
  location /api/ {
    limit_req zone=api burst=40 nodelay;
    proxy_pass http://api_upstream/;
    include /etc/nginx/proxy-headers.conf;
    proxy_set_header X-Forwarded-Proto $forwarded_proto;
  }

  # Preserve /socket.io/ and do not apply REST limits to long polling/WebSockets.
  location /socket.io/ {
    proxy_pass http://api_upstream;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    include /etc/nginx/proxy-headers.conf;
    proxy_set_header X-Forwarded-Proto $forwarded_proto;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    proxy_buffering off;
  }

  location / {
    proxy_pass http://web_upstream;
    proxy_http_version 1.1;
    include /etc/nginx/proxy-headers.conf;
    proxy_set_header X-Forwarded-Proto $forwarded_proto;
  }
}
